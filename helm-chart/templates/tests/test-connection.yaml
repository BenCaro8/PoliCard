apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "commercialwebsite.fullname" . }}-test-connection"
  labels:
    {{- include "commercialwebsite.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "commercialwebsite.fullname" . }}-graphql:{{ .Values.services.graphql.service.port }}']
