{{- range $serviceName, $service := .Values.services }}
{{- if $service.enabled }}
{{- $hasSecrets := false }}
{{- range $key, $value := $service.secrets }}
  {{- if $value }}
    {{- $hasSecrets = true }}
  {{- end }}
{{- end }}
{{- if $hasSecrets }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "commercialwebsite.fullname" $ }}-{{ $serviceName }}-secrets
  labels:
    {{- include "commercialwebsite.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $serviceName }}
type: Opaque
data:
  {{- range $key, $value := $service.secrets }}
  {{- if $value }}
  {{ $key }}: {{ $value | b64enc }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
