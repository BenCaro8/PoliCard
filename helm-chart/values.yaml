# Default values for commercialwebsite.
# This is a YAML-formatted file.
# Declare variables to be substituted into your templates.

# Global settings
global:
  imagePullSecrets: []
  nameOverride: ""
  fullnameOverride: ""

# Service definitions - easily add more services here
services:
  # GraphQL API Service (currently active)
  graphql:
    enabled: true
    replicaCount: 1
    healthCheck:
      enabled: false
    
    image:
      repository: 339712859667.dkr.ecr.us-east-1.amazonaws.com/graphql
      pullPolicy: IfNotPresent
      tag: "latest"
    
    service:
      type: NodePort
      port: 4000
      targetPort: 4000
      nodePort: 30000
    
    serviceAccount:
      create: true
      annotations: {}
      name: ""
    
    podAnnotations: {}
    
    podSecurityContext: {}
      # fsGroup: 2000
    
    securityContext: {}
      # capabilities:
      #   drop:
      #   - ALL
      # readOnlyRootFilesystem: true
      # runAsNonRoot: true
      # runAsUser: 1000
    
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
    
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 100
      targetCPUUtilizationPercentage: 80
    
    nodeSelector: {}
    tolerations: []
    affinity: {}
    
    # Environment variables specific to GraphQL service
    env:
      NODE_ENV: "development"
      LOCAL_ADDR: "http://localhost"
      LOCAL_PORT: "4000"
      LOCAL_WEB_PORT: "3000"
      GRAPHQL_ROUTE: "/graphql"
      APPDATA_DB_USER: "postgres"
      GEMINI_URI: "http://gemini:5000"
      AWS_REGION: "us-east-1"
      S3_BUCKET_NAME: "pocketnaut-tts-audio"
      COGNITO_CLIENT_ID: "3tr4j39dtjgekv0985caffr3fg"
      COGNITO_USER_POOL_ID: "us-east-1_7mEFy7BEc"
    
    # Secret environment variables for GraphQL service
    secrets:
      APPDATA_DB_URL: ""
      APPDATA_DB_PASSWORD: ""
      GOOGLE_API_KEY: ""
      AWS_ACCESS_KEY_ID: ""
      AWS_SECRET_ACCESS_KEY: ""
      ELEVENLABS_API_KEY: ""
      COGNITO_CLIENT_SECRET: ""

  # Frontend Service (disabled for now - enable when ready)
  frontend:
    enabled: false
    replicaCount: 1
    
    image:
      repository: 339712859667.dkr.ecr.us-east-1.amazonaws.com/frontend
      pullPolicy: IfNotPresent
      tag: "latest"
    
    service:
      type: ClusterIP
      port: 3000
      targetPort: 3000
    
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi
    
    env:
      NODE_ENV: "development"
      REACT_APP_GRAPHQL_URL: "http://localhost:4000/graphql"

  # Mobile API Service (disabled for now - enable when ready)  
  mobile:
    enabled: false
    replicaCount: 1
    
    image:
      repository: 339712859667.dkr.ecr.us-east-1.amazonaws.com/mobile-api
      pullPolicy: IfNotPresent
      tag: "latest"
    
    service:
      type: ClusterIP
      port: 8080
      targetPort: 8080
    
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

# Global ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: commercialwebsite.local
      paths:
        - path: /
          pathType: Prefix
          service: graphql  # Route to GraphQL service
  tls: []
  #  - secretName: commercialwebsite-tls
  #    hosts:
  #      - commercialwebsite.local
