directive @auth on FIELD | FIELD_DEFINITION

directive @hasRole(role: [String]) on FIELD | FIELD_DEFINITION

type Query {
  getPolitician(id: ID!): Politician
  _empty: String
}

type Mutation {
  runPoliticianIngestion(name: String!): Politician
  _empty: String
}

type Politician {
  id: ID!
  name: String!
  summary: String!
  ideologyScore: Float
  ideologySource: String
  recentVotes: [PoliticianVote!]!
  recentNews: [PoliticianNewsItem!]!
  updatedAt: String!
}

enum VotePosition {
  Yea
  Nay
  Absent
}

type PoliticianVote {
  bill: String!
  date: String!
  position: VotePosition!
  summary: String!
}

type PoliticianNewsItem {
  title: String!
  source: String!
  url: String!
  publishedAt: String!
  summary: String!
}